name: REPI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Repository check
        run: npm run check

      - name: REPI offline smoke
        run: node scripts/reverse-agent/repi-smoke.mjs . --json

      - name: No generated diff
        run: |
          git diff --check
          git diff --exit-code
