name: REPI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ai
            workspace: packages/ai
            args: ""
            forks: false
          - name: agent
            workspace: packages/agent
            args: ""
            forks: false
          - name: coding-agent-1
            workspace: packages/coding-agent
            args: "--project=threads --shard=1/4"
            forks: true
          - name: coding-agent-2
            workspace: packages/coding-agent
            args: "--project=threads --shard=2/4"
            forks: false
          - name: coding-agent-3
            workspace: packages/coding-agent
            args: "--project=threads --shard=3/4"
            forks: false
          - name: coding-agent-4
            workspace: packages/coding-agent
            args: "--project=threads --shard=4/4"
            forks: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build test package entrypoints
        run: |
          npm run build --workspace @pi-recon/repi-tui
          npm run build --workspace @pi-recon/repi-ai
          npm run build --workspace @pi-recon/repi-agent-core
          npm run build --workspace @pi-recon/repi-coding-agent

      - name: Run complete test shard
        working-directory: ${{ matrix.workspace }}
        run: npx vitest --run ${{ matrix.args }}

      - name: Run coding-agent process-isolated tests
        if: matrix.forks
        working-directory: packages/coding-agent
        run: npx vitest --run --project=forks

  check:
    name: check and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Hermetic REPI runtime dir so doctor/smoke don't depend on the
      # runner's ~/.repi/agent being pre-provisioned. init-repi-profile
      # writes the minimal runtime settings/profile here; smoke/doctor read
      # the same env var.
      REPI_CODING_AGENT_DIR: ${{ github.workspace }}/.repi-agent-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Repository check
        run: npm run check

      - name: Build runtime package entrypoints
        run: |
          (cd packages/tui && npx tsgo -p tsconfig.build.json)
          (cd packages/ai && npx tsgo -p tsconfig.build.json)
          (cd packages/agent && npx tsgo -p tsconfig.build.json)

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Provision REPI runtime
        run: node scripts/reverse-agent/init-repi-profile.mjs .

      - name: REPI offline smoke
        run: node scripts/reverse-agent/repi-smoke.mjs . --json

      - name: REPI install path smoke
        run: npm run smoke:install-path -- --json

      - name: REPI extension compatibility smoke
        run: npm run smoke:extensions -- --json

      - name: No generated diff
        run: |
          git diff --check
          git diff --exit-code
